security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: "^/(_(profiler|wdt)|css|images|js)/"
            security: false

        login_password:
            pattern: "^/api/auth/login$"
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: "^/api"
            stateless: true
            provider: app_user_provider
            entry_point: jwt
            jwt: ~
            refresh_jwt:
                check_path: /api/token/refresh

        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\JwtCookieAuthenticator
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                success_handler: App\Security\FormLoginSuccessHandler
                failure_handler: App\Security\FormLoginFailureHandler
            logout:
                path: app_logout
                target: app_user_login
                delete_cookies:
                    BEARER: { path: / }
                    REFRESH_TOKEN: { path: / }

    access_control:
        - { path: "^/$", roles: PUBLIC_ACCESS }
        - { path: "^/login$", roles: PUBLIC_ACCESS }
        - { path: "^/user/login$", roles: PUBLIC_ACCESS }
        - { path: "^/user/register$", roles: PUBLIC_ACCESS }

        - { path: "^/api/auth/register$", roles: PUBLIC_ACCESS }
        - { path: "^/api/auth/login$", roles: PUBLIC_ACCESS }
        - { path: "^/api/auth/passkey/login/options$", roles: PUBLIC_ACCESS }
        - { path: "^/api/auth/passkey/login/verify$", roles: PUBLIC_ACCESS }
        - { path: "^/api/token/refresh$", roles: PUBLIC_ACCESS }

        - { path: "^/auth/passkey/register/options$", roles: ROLE_USER }
        - { path: "^/auth/passkey/register/verify$", roles: ROLE_USER }

        - { path: "^/admin", roles: ROLE_ADMIN }
        - { path: "^/api/admin", roles: ROLE_ADMIN }
        - { path: "^/api/auth/me$", roles: ROLE_USER }
        - { path: "^/api", roles: ROLE_USER }