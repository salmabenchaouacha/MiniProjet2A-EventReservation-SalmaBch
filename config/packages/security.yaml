security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login_password:
            pattern: ^/api/auth/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: email
                password_parameter: password
                enable_csrf: true
                success_handler: App\Security\FormLoginSuccessHandler
                failure_handler: App\Security\FormLoginFailureHandler

            logout:
                path: app_logout
                target: /

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/user/login$, roles: PUBLIC_ACCESS }
        - { path: ^/user/register$, roles: PUBLIC_ACCESS }

        - { path: ^/api/auth/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/passkey/login/options$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/passkey/login/verify$, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh$, roles: PUBLIC_ACCESS }

        - { path: ^/admin, roles: ROLE_ADMIN }

        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api/auth/passkey/register, roles: ROLE_USER }
        - { path: ^/api/auth/me$, roles: ROLE_USER }
        - { path: ^/api, roles: ROLE_USER }